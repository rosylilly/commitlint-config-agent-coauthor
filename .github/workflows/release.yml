name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Maintains the Release PR (CHANGELOG + version) and, when it is merged,
  # creates the git tag + GitHub Release. `release_created` is the single source
  # of truth that drives the publish jobs below.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint a short-lived, repo-scoped GitHub App installation token. PRs opened
      # with it trigger CI / Commit Lint (the default GITHUB_TOKEN does not start
      # other workflows, and a long-lived PAT is too broad to be safe). Falls back
      # to GITHUB_TOKEN until the App is configured — the PR is still created, just
      # without checks.
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Stable → npmjs.org (unscoped, public, with provenance). Only on a release.
  npm-stable:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance attestation
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0
      - run: pnpm run build
      - run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # GitHub Packages (org-scoped). Runs on every push: a stable @latest mirror on
  # a release, otherwise a <next-patch>-nightly.<ts> prerelease tagged @nightly.
  github-packages:
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@${{ github.repository_owner }}"
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0
      - run: pnpm run build
      - name: Set scoped name and channel
        run: |
          base_name="$(node -p "require('./package.json').name")"
          npm pkg set "name=@${{ github.repository_owner }}/${base_name}"
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            tag=latest
          else
            # prerelease of the next patch so nightlies sort above the last release
            next="$(node -p "const v=require('./package.json').version.split('.').map(Number); v[2]++; v.join('.')")"
            npm pkg set "version=${next}-nightly.$(date -u +%Y%m%d%H%M%S)"
            tag=nightly
          fi
          echo "NPM_TAG=$tag" >> "$GITHUB_ENV"
          echo "Publishing $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version") (tag: $tag)"
      - name: Publish to GitHub Packages
        run: npm publish --tag "$NPM_TAG" --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
