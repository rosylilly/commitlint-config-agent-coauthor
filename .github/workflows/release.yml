name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Maintains the Release PR (CHANGELOG + version) and, when it is merged,
  # creates the git tag + GitHub Release. `release_created` gates the npm publish.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }} # tagged merge commit; used to find the Release PR
    steps:
      # Mint a short-lived, repo-scoped GitHub App installation token. PRs opened
      # with it trigger CI / Commit Lint (the default GITHUB_TOKEN does not start
      # other workflows, and a long-lived PAT is too broad to be safe). Falls back
      # to GITHUB_TOKEN until the App is configured — the PR is still created, just
      # without checks.
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Stable → npmjs.org (unscoped, public, with provenance). Only on a release.
  npm-stable:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance attestation
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # `prepare` builds dist during install; publish that with --ignore-scripts.
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0
      # Auth via npm OIDC trusted publishing — no token. Requires a Trusted
      # Publisher configured on npmjs for this repo + workflow, and npm >= 11.5.0
      # (bundled with the Node in .tool-versions). Provenance is automatic.
      - run: npm publish --provenance --access public --ignore-scripts

  # release-please only takes the lifecycle as far as `autorelease: tagged`;
  # `autorelease: published` is a convention left to the publishing tool. Flip
  # the Release PR to it once the package is actually on npm — gated on
  # `npm-stable`, so the label tracks reality, and kept in its own job so the
  # `pull-requests: write` it needs stays off the OIDC publish job.
  mark-published:
    needs: [release-please, npm-stable]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # relabel the Release PR
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      # The `autorelease: published` label is created once as repo setup, so this
      # job only needs to resolve the Release PR from the tagged merge commit and
      # swap `tagged` → `published`.
      - run: |
          pr=$(gh api "repos/${GH_REPO}/commits/${{ needs.release-please.outputs.sha }}/pulls" --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "::warning::no PR found for ${{ needs.release-please.outputs.sha }}; skipping relabel"
            exit 0
          fi
          gh pr edit "$pr" \
            --remove-label "autorelease: tagged" \
            --add-label "autorelease: published"
