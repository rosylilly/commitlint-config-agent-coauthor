name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The published package is plain JS, but the test suite runs the
        # TypeScript sources directly via Node's native type stripping, which is
        # unflagged on Node 24 (LTS) and 26 (current).
        node-version: [24, 26]
    name: node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6

      # Single source of truth for the pnpm version is devEngines.packageManager
      # in package.json. Read it here (using the runner's preinstalled Node) and
      # hand it to action-setup, whose `version` input accepts a semver range.
      - name: Resolve pnpm version from package.json
        id: pnpm-version
        run: |
          version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          if [ -z "$version" ]; then
            echo "::error::pnpm version not found in devEngines.packageManager"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Using pnpm $version (from devEngines.packageManager)"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ steps.pnpm-version.outputs.version }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0 # skip git-hook setup (prepare script) in CI

      - name: Type-check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
