name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # The integration surface is commitlint's API/types, not the Node version
    # (the shipped artifact is plain JS). So we matrix over commitlint instead:
    #   - locked: the devDependency pinned in the lockfile (reproducible baseline)
    #   - 19/20:  validate the published `>=19` peer range
    #   - latest: forward early-warning, allowed to fail so upstream releases
    #             never block this repo's own changes.
    strategy:
      fail-fast: false
      matrix:
        commitlint: [locked, "19", "20", latest]
    name: commitlint ${{ matrix.commitlint }}
    continue-on-error: ${{ matrix.commitlint == 'latest' }}
    steps:
      - uses: actions/checkout@v6

      # action-setup reads the pnpm version from the packageManager field in
      # package.json (the single source of truth), so no version input is needed.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0 # skip git-hook setup (prepare script) in CI

      - name: Override commitlint to '${{ matrix.commitlint }}'
        if: matrix.commitlint != 'locked'
        run: >-
          pnpm add -D
          @commitlint/cli@${{ matrix.commitlint }}
          @commitlint/config-conventional@${{ matrix.commitlint }}
          @commitlint/parse@${{ matrix.commitlint }}
          @commitlint/types@${{ matrix.commitlint }}
        env:
          HUSKY: 0

      - name: Report commitlint version under test
        run: pnpm exec commitlint --version

      - name: Type-check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      # Exercise the real consumer path: commitlint loads this repo's config
      # (which registers the plugin + rule) and lints sample messages.
      - name: Integration (commitlint CLI against this config)
        run: |
          set -e
          echo "feat: example" | pnpm exec commitlint
          if echo "feat: example" | CLAUDECODE=1 pnpm exec commitlint; then
            echo "::error::agent-coauthor should reject a commit missing the trailer"
            exit 1
          fi
          printf 'feat: example\n\nCo-authored-by: Claude <noreply@anthropic.com>\n' \
            | CLAUDECODE=1 pnpm exec commitlint
