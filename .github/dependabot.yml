version: 2
updates:
  # npm dependencies (pnpm). Dependabot resolves the pnpm version from the
  # packageManager field in package.json via corepack, so lockfile updates use
  # the same pnpm major that generated pnpm-lock.yaml. The @commitlint/* packages
  # are versioned in lockstep, so group them into one PR to avoid a broken mix
  # (e.g. cli@22 + types@21).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
    groups:
      commitlint:
        patterns:
          - "@commitlint/*"
      dev-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@commitlint/*"

  # GitHub Actions used in workflows. One grouped PR per run keeps action bumps
  # together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
